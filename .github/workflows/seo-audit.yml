name: SEO Audit

on:
  push:
    branches: [master]
  schedule:
    # Runs every Monday at 07:00 UTC (12:30 PM Sri Lanka time)
    - cron: '0 7 * * 1'
  workflow_dispatch:

jobs:
  seo-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── 1. Wait for Vercel deploy to settle (only on push) ─────────────────
      - name: Wait for deployment
        if: github.event_name == 'push'
        run: sleep 120

      # ── 2. Canonical URL checks ────────────────────────────────────────────
      - name: Check canonical URLs
        run: |
          BASE="https://www.stxaviertimber.com"
          FAIL=0

          check_canonical() {
            local path="$1"
            local expected
            if [ "$path" = "/" ]; then
              expected="${BASE}"
            else
              expected="${BASE}${path}"
            fi
            local url="${BASE}${path}"
            # Use grep -o + sed instead of lookbehind (more portable)
            local canonical
            canonical=$(curl -s --max-time 20 "$url" \
              | grep -o 'rel="canonical" href="[^"]*"' \
              | sed 's/.*href="\([^"]*\)".*/\1/' \
              | head -1)

            if [ -z "$canonical" ]; then
              echo "FAIL: Missing canonical on $path"
              FAIL=1
            elif [ "$canonical" != "$expected" ]; then
              echo "FAIL: Wrong canonical on $path"
              echo "  Expected: $expected"
              echo "  Got:      $canonical"
              FAIL=1
            else
              echo "OK: $path => $canonical"
            fi
          }

          check_canonical "/"
          check_canonical "/blog"
          check_canonical "/about"
          check_canonical "/calculator"
          check_canonical "/case-studies"
          check_canonical "/timber-treatment-negombo"
          check_canonical "/timber-treatment-colombo"
          check_canonical "/timber-treatment-gampaha"
          check_canonical "/timber-treatment-kandy"

          # Spot-check first blog post
          FIRST_SLUG=$(curl -s "${BASE}/sitemap.xml" \
            | grep -o '<loc>[^<]*blog[^<]*</loc>' \
            | sed 's|<loc>\(.*\)</loc>|\1|' \
            | head -1)
          if [ -n "$FIRST_SLUG" ]; then
            PATH_ONLY="${FIRST_SLUG#$BASE}"
            check_canonical "$PATH_ONLY"
          fi

          if [ $FAIL -ne 0 ]; then
            echo "One or more canonical URLs are wrong."
            exit 1
          fi

      # ── 3. Meta description present on key pages ───────────────────────────
      - name: Check meta descriptions
        run: |
          BASE="https://www.stxaviertimber.com"
          FAIL=0
          PAGES=("/" "/blog" "/about" "/calculator" "/timber-treatment-negombo" "/timber-treatment-colombo" "/timber-treatment-gampaha" "/timber-treatment-kandy")

          for path in "${PAGES[@]}"; do
            meta=$(curl -s --max-time 20 "${BASE}${path}" \
              | grep -o 'name="description" content="[^"]*"' \
              | sed 's/.*content="\([^"]*\)".*/\1/' \
              | head -1)
            if [ -z "$meta" ]; then
              echo "FAIL: Missing meta description on $path"
              FAIL=1
            else
              len=${#meta}
              if [ $len -lt 50 ]; then
                echo "WARN: Meta too short (${len} chars): $path"
              elif [ $len -gt 160 ]; then
                echo "WARN: Meta too long (${len} chars, truncates in SERPs): $path"
              else
                echo "OK: $path (${len} chars)"
              fi
            fi
          done

          if [ $FAIL -ne 0 ]; then exit 1; fi

      # ── 4. Sitemap accessible and non-empty ────────────────────────────────
      - name: Check sitemap
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://www.stxaviertimber.com/sitemap.xml")
          if [ "$STATUS" != "200" ]; then
            echo "FAIL: Sitemap returned HTTP $STATUS"
            exit 1
          fi
          COUNT=$(curl -s "https://www.stxaviertimber.com/sitemap.xml" | grep -c "<url>")
          echo "OK: Sitemap accessible — $COUNT URLs"
          if [ "$COUNT" -lt 10 ]; then
            echo "WARN: Fewer than 10 URLs in sitemap — check posts.ts"
          fi

      # ── 5. Open Graph tags on homepage ────────────────────────────────────
      - name: Check Open Graph tags
        run: |
          curl -s --max-time 20 "https://www.stxaviertimber.com" > /tmp/homepage.html
          FAIL=0

          check_og() {
            local prop="$1"
            local val
            val=$(grep -o "property=\"og:${prop}\" content=\"[^\"]*\"" /tmp/homepage.html \
              | sed 's/.*content="\([^"]*\)".*/\1/' \
              | head -1)
            if [ -z "$val" ]; then
              echo "FAIL: Missing og:$prop"
              FAIL=1
            else
              echo "OK: og:$prop present"
            fi
          }

          check_og "title"
          check_og "description"
          check_og "url"

          # og:image is a warning only
          OG_IMAGE=$(grep -o 'property="og:image" content="[^"]*"' /tmp/homepage.html | head -1)
          if [ -z "$OG_IMAGE" ]; then
            echo "WARN: og:image missing — add og-image.jpg to /public"
          else
            echo "OK: og:image present"
          fi

          if [ $FAIL -ne 0 ]; then exit 1; fi

      # ── 6. GA4 tag present ─────────────────────────────────────────────────
      - name: Check GA4 tag
        run: |
          if curl -s --max-time 20 "https://www.stxaviertimber.com" | grep -q "G-QS03GW2LEN"; then
            echo "OK: GA4 tag (G-QS03GW2LEN) found"
          else
            echo "FAIL: GA4 tag missing from homepage HTML"
            exit 1
          fi

      # ── 7. Key pages return HTTP 200 ───────────────────────────────────────
      - name: Check page status codes
        run: |
          BASE="https://www.stxaviertimber.com"
          FAIL=0
          PAGES=("/" "/blog" "/about" "/calculator" "/case-studies" "/timber-treatment-negombo" "/timber-treatment-colombo" "/timber-treatment-gampaha" "/timber-treatment-kandy")

          for path in "${PAGES[@]}"; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 20 "${BASE}${path}")
            if [ "$STATUS" = "200" ]; then
              echo "OK: $path => $STATUS"
            else
              echo "FAIL: $path => $STATUS"
              FAIL=1
            fi
          done

          if [ $FAIL -ne 0 ]; then exit 1; fi

      # ── 8. Structured data (LocalBusiness schema) present ─────────────────
      - name: Check LocalBusiness schema
        run: |
          if curl -s --max-time 20 "https://www.stxaviertimber.com" | grep -q '"LocalBusiness"'; then
            echo "OK: LocalBusiness schema found"
          else
            echo "FAIL: LocalBusiness schema missing"
            exit 1
          fi
